# Canonical Dependabot config for the wyre-technology *-mcp / node-* fleet.
#
# Goal: keep PR volume manageable for a small team. Updates are GROUPED so a
# repo gets a handful of PRs per week instead of one-per-package, and the
# dependabot-janitor (daily) auto-merges the green grouped PRs. Only
# PRODUCTION-dependency MAJOR bumps land as individual PRs for human review,
# since those can carry behavioural breaking changes a green test suite misses.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    groups:
      # All dev/CI tooling (eslint, vitest, typescript, @types/*, etc.) →
      # ONE PR. Minor/patch auto-merged when CI is green.
      # MAJORS excluded from auto-merge (2026-07-20): a grouped
      # major bump (e.g. typescript 6->7) auto-merged blind against this
      # repo's "green" thin-caller release.yml, which has no PR-time
      # build/test job -- broke main twice in 2 days. Majors now land as
      # individual, non-auto-merged PRs, same treatment production majors
      # already get below. Interim stop-gap; the durable fix is real
      # PR-time CI on this repo (tracked fleet-wide separately).
      dev-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      # Production minor + patch → ONE PR. Auto-merged when green.
      production-minor-patch:
        dependency-type: "production"
        update-types: ["minor", "patch"]
    # Production MAJORS are intentionally NOT grouped → individual PRs, held for
    # human review (never auto-merged).

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "docker"
      include: "scope"
    groups:
      docker:
        patterns: ["*"]
